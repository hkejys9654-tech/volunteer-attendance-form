<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>index.html 모바일 복사</title>
<style>
  :root{--bg:#f4f6f4;--ink:#17211c;--muted:#66736d;--line:#d9dfd9;--pine:#1c6b50;--pine-d:#155440;--soft:#e5f1eb}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif}
  main{max-width:720px;margin:0 auto;padding:18px 14px calc(22px + env(safe-area-inset-bottom))}
  h1{margin:0 0 8px;font-size:22px;line-height:1.25;letter-spacing:0}
  p{margin:0 0 14px;color:var(--muted);font-size:14px;line-height:1.5}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:0 6px 18px rgba(20,40,30,.06)}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  button,a.btn{border:0;border-radius:10px;padding:13px 14px;font-size:15px;font-weight:800;text-decoration:none;text-align:center}
  button{background:var(--pine);color:#fff;flex:1}
  a.btn{background:var(--soft);color:var(--pine-d);display:inline-block}
  .status{font-size:13px;color:var(--muted);margin:8px 0 10px;min-height:20px}
  textarea{width:100%;height:58vh;min-height:360px;border:1px solid var(--line);border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;font-size:12px;line-height:1.45;resize:vertical;color:#1f2a24;background:#fbfcfb}
  .links{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .links .btn{flex:1;min-width:150px}
</style>
</head>
<body>
<main>
  <h1>index.html 모바일 복사</h1>
  <p>아래 버튼을 눌러 최신 HTML 전체 내용을 복사하세요.</p>
  <section class="panel">
    <div class="bar">
      <button id="copyBtn" disabled>전체 복사</button>
    </div>
    <div class="status" id="status">불러오는 중...</div>
    <textarea id="code" readonly spellcheck="false"></textarea>
    <div class="links">
      <a class="btn" href="./github-index.txt">txt 직접 열기</a>
      <a class="btn" href="./">테스트 페이지 열기</a>
    </div>
  </section>
</main>
<script>
(function(){
  var code=document.getElementById('code');
  var status=document.getElementById('status');
  var copyBtn=document.getElementById('copyBtn');
  function setStatus(msg){status.textContent=msg}
  function fallbackCopy(){
    code.focus();
    code.select();
    code.setSelectionRange(0, code.value.length);
    var ok=false;
    try{ok=document.execCommand('copy')}catch(e){}
    setStatus(ok?'복사됐어요. GitHub index.html에 붙여넣으세요.':'복사가 막혔어요. 텍스트 상자를 길게 눌러 전체 선택 후 복사하세요.');
  }
  copyBtn.addEventListener('click',function(){
    if(!code.value)return;
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(code.value)
        .then(function(){setStatus('복사됐어요. GitHub index.html에 붙여넣으세요.')})
        .catch(fallbackCopy);
    }else fallbackCopy();
  });
  fetch('./github-index.txt?ts='+Date.now(),{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('load failed');return r.text()})
    .then(function(text){
      code.value=text;
      copyBtn.disabled=false;
      setStatus('준비 완료: '+text.length.toLocaleString()+'자');
    })
    .catch(function(){
      setStatus('파일을 불러오지 못했어요. 새로고침 후 다시 시도하세요.');
    });
})();
</script>
</body>
</html>
